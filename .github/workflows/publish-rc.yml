name: publish-rc-manual

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Lista de paquetes (ej: @nimbus-ds/button, @nimbus-ds/box)"
        required: true
        type: string
      bump_type:
        description: "Tipo de incremento (patch, minor, major)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

# 1. PERMISOS: Copiados exactamente del template para habilitar OIDC
permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  publish-rc-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Increase swapfile
        run: |
          sudo swapoff -a
          sudo fallocate -l 15G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Checkout
        uses: actions/checkout@v4

      # 2. SETUP NODE: Usamos la configuración exacta del template exitoso
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'
          auth-oidc: true # Aquí se activa el Trusted Publisher

      # 3. UPGRADE NPM: Misma versión que el template
      - name: Upgrade npm
        run: npm install -g npm@latest

      - uses: ./.github/actions/setup-node-deps

      - name: Build packages
        run: |
          export NODE_OPTIONS="--max_old_space_size=12288"
          yarn build:tokens
          yarn build:icons
          yarn build:components
          yarn workspace @nimbus-ds/components build
          yarn build:packages

      # 4. PUBLISH: Usando comandos de NPM (como el template) dentro del loop
      - name: Publish RC packages
        run: |
          IFS=',' read -ra PACKAGES <<< "${{ github.event.inputs.packages }}"

          for package in "${PACKAGES[@]}"; do
            package=$(echo "$package" | xargs)
            if [ -n "$package" ]; then
              echo ":package: Preparando publicación NPM para $package..."

              # Obtenemos la ruta del package dinámicamente
              PKG_PATH=$(yarn workspace "$package" exec pwd)

              cd "$PKG_PATH"

              # Usamos los mismos comandos del template:
              # 1. Versionado (sin tag de git)
              npm version ${{ github.event.inputs.bump_type }} --no-git-tag-version

              # 2. Publicación usando el token de OIDC que ya está en el entorno
              # Usamos --tag rc para que no pise la versión estable
              npm publish --tag rc --access public

              cd - > /dev/null
            fi
          done
        env:
          # El template usa NODE_AUTH_TOKEN generado por setup-node
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Opcional si usas OIDC puro, pero setup-node lo maneja
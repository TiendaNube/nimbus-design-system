name: publish-rc-manual

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Comma-separated list of packages to publish"
        required: true
        type: string
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

# PASO 1: Agregamos permisos para OIDC (Copiado del template)
permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  publish-rc-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Increase swapfile
        run: |
          sudo swapoff -a
          sudo fallocate -l 15G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Checkout
        uses: actions/checkout@v4 # Actualizado a v4 como el template

      # PASO 2: Setup Node con OIDC (Copiado del template)
      - uses: actions/setup-node@v4
        id: setup-node
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'
          auth-oidc: true

      - uses: ./.github/actions/setup-node-deps

      - name: Create .env file
        run: |
          echo "GITHUB_TOKEN=${{ secrets.PAT_CHANGE_BRANCH_PROTECTION_RULES_FROM_USER_NIMBUS }}" > .env

      - name: Build tokens
        run: yarn build:tokens

      - name: Build icons
        run: yarn build:icons

      - name: Build components
        run: |
          export NODE_OPTIONS="--max_old_space_size=12288"
          yarn build:components

      - name: Build @nimbus-ds/components bundle
        run: |
          export NODE_OPTIONS="--max_old_space_size=12288"
          yarn workspace @nimbus-ds/components build

      - name: Build packages
        run: |
          export NODE_OPTIONS="--max_old_space_size=12288"
          yarn build:packages

      - name: Publish RC packages
        run: |
          IFS=',' read -ra PACKAGES <<< "${{ github.event.inputs.packages }}"
          FAILED=0
          FAILED_PACKAGES=""

          # Configuramos Yarn para que use el token de OIDC
          # Esto resuelve el error YN0033
          yarn config set npmAuthToken "$NODE_AUTH_TOKEN"

          for package in "${PACKAGES[@]}"; do
            package=$(echo "$package" | xargs)
            if [ -n "$package" ]; then
              echo ":package: Publishing RC for $package with bump type: ${{ github.event.inputs.bump_type }}"
              set +e
              echo "y" | yarn publish:rc "$package" "${{ github.event.inputs.bump_type }}" --skip-build
              EXIT_CODE=$?
              set -e
              if [ $EXIT_CODE -ne 0 ]; then
                echo ":x: Failed to publish $package (exit code: $EXIT_CODE)"
                FAILED=$((FAILED + 1))
                FAILED_PACKAGES="${FAILED_PACKAGES}${FAILED_PACKAGES:+, }$package"
              fi
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "=========================================="
            echo ":x: PUBLISH SUMMARY: $FAILED package(s) failed"
            echo "Failed packages: $FAILED_PACKAGES"
            echo "=========================================="
            exit 1
          fi
          echo ":white_check_mark: All packages published successfully"
        env:
          # PASO 3: Usamos el token generado por OIDC en lugar del secreto manual
          NODE_AUTH_TOKEN: ${{ steps.setup-node.outputs.auth-token }}
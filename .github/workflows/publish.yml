name: publish-release

on:
  push:
    branches:
      - master
      - "!dependabot/**/**"
    paths-ignore:
      - "**/package.json"
      - ".yarn/versions/**"
      - "**/*.docs.json"

jobs:
  publish-packages-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 1️⃣ Permisos necesarios para Trusted Publisher (id-token) y el PR (contents/pull-requests)
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Increase swapfile
        run: |
          sudo swapoff -a
          sudo fallocate -l 15G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show
          
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Configuración de Node con OIDC habilitado
      # Nota: Si tu acción local 'setup-node-deps' no soporta auth-oidc, 
      # podrías necesitar usar actions/setup-node@v4 directamente aquí.
      - uses: actions/setup-node@v4
        with:
          node-version: '20' # Ajusta según tu .nvmrc si es necesario
          registry-url: 'https://registry.npmjs.org/'
          auth-oidc: true

      - uses: ./.github/actions/setup-node-deps

      - name: Create .env file
        run: |
          echo "GITHUB_TOKEN=${{ secrets.PAT_CHANGE_BRANCH_PROTECTION_RULES_FROM_USER_NIMBUS }}" > .env

      - name: Build tokens
        run: yarn build:tokens

      - name: Build icons
        run: yarn build:icons
        
      - name: Build components
        run: |
          export NODE_OPTIONS="--max_old_space_size=12288"
          yarn build:components

      - name: Build packages
        run: |
          export NODE_OPTIONS="--max_old_space_size=12288"
          yarn build:packages

      - name: Build docs
        run: yarn build:docs

      - name: Publish packages
        # 3️⃣ Eliminamos YARN_NPM_AUTH_TOKEN ya que se usará la identidad OIDC
        # Usamos 'npm publish' para asegurar la compatibilidad nativa con Trusted Publishers
        # Si Nimbus es un monorepo, 'npm publish -w' o iterar por paquetes es lo ideal
        run: |
          if [ -f ".yarnrc.yml" ]; then
            # Si usas Yarn Berry, esto configura el modo OIDC para el comando publish
            yarn config set npmAuthIdent "" 
            yarn config set npmAlwaysAuth false
          fi
          yarn publish:stable
        env:
          # Trusted Publisher funciona mejor con el cliente npm nativo o Yarn Berry configurado
          NODE_AUTH_TOKEN: "" # Se deja vacío para forzar el uso del token OIDC

      - name: Create release PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: publish release [skip ci]"
          title: "feat: publish release"
          body: |
            Automated publish release — updates package versions and docs.
          add-paths: |
            packages/**/package.json
            **/*.docs.json
            .yarn/versions/**
          branch: release/publish-${{ github.run_id }}
          base: master

  trigger-action-create-github-tag:
    runs-on: ubuntu-latest
    needs: publish-packages-npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Trigger github action create github tag
        run: |
          curl --request POST \
          --url 'https://api.github.com/repos/tiendanube/nimbus-design-system/actions/workflows/58856079/dispatches' \
          --header 'Authorization: token ${{ secrets.PAT_CHANGE_BRANCH_PROTECTION_RULES_FROM_USER_NIMBUS }}' \
          --data '{"ref":"master"}'

  trigger-action-send-slack-notifications:
    needs: [publish-packages-npm, trigger-action-create-github-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Trigger github action send slack notifications
        run: |
          curl --request POST \
          --url 'https://api.github.com/repos/tiendanube/nimbus-design-system/actions/workflows/58847410/dispatches' \
          --header 'Authorization: token ${{ secrets.PAT_CHANGE_BRANCH_PROTECTION_RULES_FROM_USER_NIMBUS }}' \
          --data '{"ref":"master"}'

  trigger-action-update-generate-documentation:
    needs:
      [
        publish-packages-npm,
        trigger-action-create-github-tag,
        trigger-action-send-slack-notifications,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Trigger github action update documentation
        run: |
          curl --request POST \
          --url 'https://api.github.com/repos/tiendanube/nimbus-design-system/actions/workflows/51785513/dispatches' \
          --header 'Authorization: token ${{ secrets.PAT_CHANGE_BRANCH_PROTECTION_RULES_FROM_USER_NIMBUS }}' \
          --data '{"ref":"master"}'
